services:
  test:
    build: .
    command: pytest
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/test_db
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
